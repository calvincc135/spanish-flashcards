<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spanish Flashcards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  h1 { margin-bottom: 10px; font-size: 1.6rem; color: #e94560; }
  .progress { margin-bottom: 20px; font-size: 0.95rem; color: #aaa; }
  .card-container {
    perspective: 800px;
    width: 100%;
    max-width: 560px;
    height: 280px;
    cursor: pointer;
    margin-bottom: 24px;
  }
  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    text-align: center;
    font-size: 1.35rem;
    line-height: 1.5;
  }
  .card-front {
    background: linear-gradient(135deg, #16213e, #0f3460);
    border: 2px solid #e94560;
  }
  .card-back {
    background: linear-gradient(135deg, #0f3460, #533483);
    border: 2px solid #e94560;
    transform: rotateY(180deg);
  }
  .card-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #e94560;
    margin-bottom: 12px;
  }
  .hint { font-size: 0.8rem; color: #888; margin-top: 14px; }
  .controls {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-prev, .btn-next {
    background: #e94560;
    color: #fff;
  }
  .btn-prev:hover, .btn-next:hover { background: #c73652; }
  .btn-shuffle { background: #533483; color: #fff; }
  .btn-shuffle:hover { background: #6c44a2; }
  .btn-flip { background: #0f3460; color: #fff; border: 1px solid #e94560; }
  .btn-flip:hover { background: #16213e; }
  @media (max-width: 600px) {
    .card-container { height: 240px; }
    .card-face { font-size: 1.1rem; padding: 20px; }
  }
</style>
</head>
<body>

<h1>Spanish Question Flashcards</h1>
<div class="progress" id="progress"></div>

<div class="card-container" id="cardContainer">
  <div class="card" id="card">
    <div class="card-face card-front">
      <div class="card-label">Pregunta</div>
      <div id="front"></div>
      <div class="hint">Click to reveal answer</div>
    </div>
    <div class="card-face card-back">
      <div class="card-label">Respuesta</div>
      <div id="back"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn-prev" onclick="prev()">&#9664; Prev</button>
  <button class="btn-flip" onclick="flip()">Flip</button>
  <button class="btn-shuffle" onclick="shuffle()">Shuffle</button>
  <button class="btn-next" onclick="next()">Next &#9654;</button>
</div>

<script>
const cards = [
  { q: "\u00bfC\u00f3mo te llamas?", a: "Me llamo... (My name is...)" },
  { q: "\u00bfC\u00f3mo est\u00e1s?", a: "Estoy bien / mal / as\u00ed as\u00ed. (I'm good / bad / so-so.)" },
  { q: "\u00bfDe d\u00f3nde eres?", a: "Soy de... (I am from...)" },
  { q: "\u00bfCu\u00e1ntos a\u00f1os tienes?", a: "Tengo ... a\u00f1os. (I am ... years old.)" },
  { q: "\u00bfD\u00f3nde vives?", a: "Vivo en... (I live in...)" },
  { q: "\u00bfQu\u00e9 te gusta?", a: "Me gusta... (I like...)" },
  { q: "Mucho Gusto\u2026", a: "Nice to meet you. / El gusto es m\u00edo. (The pleasure is mine.)" },
  { q: "\u00bfCu\u00e1ntas clases tomas?", a: "Tomo ... clases. (I take ... classes.)" },
  { q: "\u00bfTe gusta la clase de espa\u00f1ol?", a: "S\u00ed, me gusta. / No, no me gusta. (Yes, I like it. / No, I don't like it.)" },
  { q: "\u00bfCu\u00e1ntas personas hay en tu clase de arte?", a: "Hay ... personas en mi clase de arte. (There are ... people in my art class.)" },
  { q: "\u00bfCu\u00e1l es tu n\u00famero de tel\u00e9fono?", a: "Mi n\u00famero de tel\u00e9fono es... (My phone number is...)" },
  { q: "\u00bfTienes una familia grande?", a: "S\u00ed, tengo una familia grande. / No, tengo una familia peque\u00f1a. (Yes/No, I have a big/small family.)" },
  { q: "\u00bfDe d\u00f3nde son tus padres?", a: "Mis padres son de... (My parents are from...)" },
  { q: "\u00bfTienes hermanos o hermanas?", a: "S\u00ed, tengo ... hermano(s)/hermana(s). / No, soy hijo/hija \u00fanico/a. (Yes, I have ... brother(s)/sister(s). / No, I'm an only child.)" },
  { q: "\u00bfC\u00f3mo eres?", a: "Soy ... (alto/a, inteligente, divertido/a, etc.) (I am ... tall, smart, fun, etc.)" },
  { q: "\u00bfQu\u00e9 vas a hacer esta noche?", a: "Voy a... (I am going to...)" },
  { q: "\u00bfA qu\u00e9 eres aficionado?", a: "Soy aficionado/a a... (I am a fan of...)" },
  { q: "\u00bfQu\u00e9 vas a hacer este verano?", a: "Voy a... (I am going to...)" },
  { q: "\u00bfPiensas estudiar este verano?", a: "S\u00ed, pienso estudiar. / No, no pienso estudiar. (Yes/No, I plan to study.)" },
  { q: "\u00bfPrefieres las pel\u00edculas rom\u00e1nticas, las de acci\u00f3n o las pel\u00edculas de horror? \u00bfPor qu\u00e9?", a: "Prefiero las pel\u00edculas ... porque... (I prefer ... movies because...)" },
  { q: "\u00bfCu\u00e1ntas personas hay en tu familia?", a: "Hay ... personas en mi familia. (There are ... people in my family.)" },
  { q: "\u00bfDe qu\u00e9 color es tu corbata?", a: "Mi corbata es... (My tie is... roja, azul, negra, etc.)" },
  { q: "\u00bfDe qu\u00e9 color es la bandera de Espa\u00f1a?", a: "La bandera de Espa\u00f1a es roja y amarilla. (The flag of Spain is red and yellow.)" },
  { q: "\u00bfQui\u00e9n es tu profesor de historia?", a: "Mi profesor/a de historia es... (My history teacher is...)" },
  { q: "\u00bfCu\u00e1ndo es tu cumplea\u00f1os?", a: "Mi cumplea\u00f1os es el ... de ... (My birthday is on...)" },
  { q: "\u00bfQu\u00e9 hora es?", a: "Es la una. / Son las ... (It is one o'clock. / It is ...)" },
  { q: "\u00bfCu\u00e1ntos son 2 m\u00e1s 12?", a: "Son catorce. (They are fourteen.)" },
  { q: "\u00bfCu\u00e1l es la fecha?", a: "Hoy es el ... de ... de ... (Today is the ...)" },
  { q: "\u00bfQu\u00e9 deporte juegas en la primavera?", a: "Juego al ... en la primavera. (I play ... in the spring.)" },
  { q: "\u00bfCu\u00e1ndo empieza la clase de espa\u00f1ol?", a: "La clase de espa\u00f1ol empieza a las... (Spanish class starts at...)" },
  { q: "\u00bfCu\u00e1ndo almorzamos?", a: "Almorzamos a las... (We eat lunch at...)" },
  { q: "\u00bfA qu\u00e9 hora vuelves a casa?", a: "Vuelvo a casa a las... (I return home at...)" },
  { q: "\u00bfT\u00fa prefieres Pepsi o Coca Cola?", a: "Prefiero... (I prefer...)" },
  { q: "\u00bfDuermes en la clase de espa\u00f1ol?", a: "No, no duermo en la clase. / S\u00ed, duermo en la clase. (No, I don't sleep in class. / Yes, I sleep in class.)" },
  { q: "\u00bfC\u00f3mo se dice \u201cthe book\u201d en espa\u00f1ol?", a: "Se dice \u201cel libro.\u201d (You say \u201cel libro.\u201d)" }
];

let current = 0;

function render() {
  document.getElementById('front').textContent = cards[current].q;
  document.getElementById('back').textContent = cards[current].a;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('progress').textContent = `Card ${current + 1} of ${cards.length}`;
}

function flip() {
  document.getElementById('card').classList.toggle('flipped');
}

document.getElementById('cardContainer').addEventListener('click', flip);

function next() {
  current = (current + 1) % cards.length;
  render();
}

function prev() {
  current = (current - 1 + cards.length) % cards.length;
  render();
}

function shuffle() {
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  current = 0;
  render();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
});

render();
</script>
</body>
</html>
